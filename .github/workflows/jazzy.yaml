name: Jazzy CI

on:
  push:
    branches:
      - 'jazzy'
      - 'ros2'
  pull_request:
  workflow_dispatch:
    branches:
      - '*'

jobs:
  jazzy_build_and_test:
    uses: naturerobots/github_automation_public/.github/workflows/ros_ci.yaml@main
    secrets: inherit
    with:
      ros_distro: jazzy
